apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-service
  labels:
    app: document-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: document-service
  template:
    metadata:
      labels:
        app: document-service
    spec:
      containers:
        - name: document-service
          image: ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}
          ports:
            - containerPort: 3003
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3003"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: document-db
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: document-db
                  key: port
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: document-db
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: document-db
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: document-db
                  key: name
            - name: STORAGE_DRIVER
              value: "local"
            - name: LOCAL_STORAGE_PATH
              value: "/data/uploads"
            - name: CORS_ORIGIN
              value: "*"
          volumeMounts:
            - name: storage
              mountPath: /data/uploads
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: document-storage-pvc
